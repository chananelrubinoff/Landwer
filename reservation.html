<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>הזמנת מקום – לנדוור אריאל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:#f5ede0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(44,26,14,0.12);width:100%;max-width:480px;overflow:hidden}
  .header{background:#2c1a0e;padding:24px;text-align:center;border-bottom:3px solid #c8892a}
  .logo{font-size:28px;font-weight:700;color:#c8892a;font-family:Georgia,serif;letter-spacing:1px}
  .subtitle{color:#f5ede0;font-size:14px;margin-top:6px}
  .form{padding:28px 24px}
  .form-title{font-size:18px;font-weight:700;color:#2c1a0e;margin-bottom:22px;text-align:center}
  .field{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:600;color:#5a3a1a;margin-bottom:6px}
  input,select,textarea{width:100%;border:1.5px solid #e2cdb0;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;background:#fdf8f2;color:#2c1a0e;transition:border-color .2s;direction:rtl}
  input:focus,select:focus,textarea:focus{border-color:#c8892a}
  textarea{resize:vertical;min-height:80px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .submit-btn{width:100%;background:#2c1a0e;color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .2s}
  .submit-btn:hover{background:#c8892a}
  .success{display:none;text-align:center;padding:30px 20px}
  .success-icon{font-size:56px;margin-bottom:16px}
  .success h2{color:#2c1a0e;font-size:22px;margin-bottom:10px}
  .success p{color:#7a5a3a;font-size:14px;line-height:1.7}
  .footer{text-align:center;padding:14px;color:#c0a080;font-size:12px;border-top:1px solid #f0e0cc}
  .required{color:#c8892a}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">LANDWER</div>
    <div class="subtitle">קפה לנדוור אריאל • מוריה 2, אריאל סנטר</div>
  </div>

  <div class="form" id="form-section">
    <div class="form-title">🪑 הזמנת מקום</div>

    <div class="field">
      <label>שם מלא <span class="required">*</span></label>
      <input type="text" id="name" placeholder="ישראל ישראלי" required/>
    </div>

    <div class="field">
      <label>טלפון <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="050-0000000" dir="ltr" required/>
    </div>

    <div class="row">
      <div class="field">
        <label>תאריך <span class="required">*</span></label>
        <input type="date" id="date" required/>
      </div>
      <div class="field">
        <label>שעה <span class="required">*</span></label>
        <input type="time" id="time" required/>
      </div>
    </div>

    <div class="field">
      <label>מספר סועדים <span class="required">*</span></label>
      <select id="guests" required>
        <option value="">בחר...</option>
        <option value="1">1 אדם</option>
        <option value="2">2 אנשים</option>
        <option value="3">3 אנשים</option>
        <option value="4">4 אנשים</option>
        <option value="5">5 אנשים</option>
        <option value="6">6 אנשים</option>
        <option value="7">7 אנשים</option>
        <option value="8">8 אנשים</option>
        <option value="9">9 אנשים</option>
        <option value="10+">10+ אנשים (נא לצלצל)</option>
      </select>
    </div>

    <div class="field">
      <label>הערות (אלרגיות, בקשות מיוחדות)</label>
      <textarea id="notes" placeholder="לדוגמה: אלרגיה לגלוטן, יום הולדת..."></textarea>
    </div>

    <button class="submit-btn" onclick="submitForm()">שלח הזמנה בוואטסאפ 📱</button>
    <p style="text-align:center;font-size:12px;color:#999;margin-top:10px">לאחר הלחיצה יפתח וואטסאפ – שלח את ההודעה לקבלת אישור מהסניף</p>
  </div>

  <div class="success" id="success-section">
    <div class="success-icon">✅</div>
    <h2>ההזמנה התקבלה!</h2>
    <p>תודה <strong id="success-name"></strong>!<br/>
    קיבלנו את בקשתך ונחזור אליך בהקדם לאישור.<br/><br/>
    לשאלות: <strong>03-6174185</strong></p>
  </div>

  <div class="footer">לנדוור אריאל • 03-6174185 • א׳–ד׳ 08:30–22:30</div>
</div>

<script>
// שנה את הכתובת הזו לאימייל שלך כדי לקבל הזמנות
const OWNER_EMAIL = ""; // הכנס כאן את האימייל שלך

function isValidHour(date, time){
  const d = new Date(date);
  const day = d.getDay(); // 0=sun...6=sat
  const [h,m] = time.split(':').map(Number);
  const mins = h*60+m;
  // שעות פתיחה פחות 20 דקות
  if(day>=0&&day<=3) return mins>=510&&mins<=1330; // א-ד 08:30-22:10
  if(day===4) return mins>=510&&mins<=1345;        // ה  08:30-22:25
  if(day===5) return mins>=510&&mins<=790;         // ו  08:30-13:10
  if(day===6) return mins>=1275&&mins<=1375;       // ש  21:15-22:55
  return false;
}

function submitForm(){
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const guests = document.getElementById('guests').value;
  const notes = document.getElementById('notes').value.trim();

  if(!name || !phone || !date || !time || !guests){
    alert('נא למלא את כל השדות החובה');
    return;
  }

  if(!isValidHour(date, time)){
    alert('הסניף סגור בשעה שבחרת 🕐\n\nשעות פעילות:\nא׳–ד׳: 08:30–22:30\nה׳: 08:30–22:45\nו׳: 08:30–13:30\nש׳: 21:15–23:15\n\nנא לבחור שעה אחרת.');
    return;
  }

  // פתח WhatsApp ישירות
  const msg = `הזמנת מקום חדשה 🪑%0A%0Aשם: ${name}%0Aטלפון: ${phone}%0Aתאריך: ${date}%0Aשעה: ${time}%0Aסועדים: ${guests}%0Aהערות: ${notes||'אין'}`;
  window.open(`https://wa.me/9720526670058?text=${msg}`, '_blank');
}

// הגדר תאריך מינימום להיום
const today = new Date().toISOString().split('T')[0];
document.getElementById('date').min = today;
</script>
</body>
</html>
